---
name: CI

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-rust-pr:
    if: github.event_name == 'pull_request' && (github.event.action != 'closed' || github.event.pull_request.merged == true)
    name: Check Rust (PR)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write    # needed for PR comments (e.g., Codecov)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # required for commit & rebase in shared action

      - name: Run shared Rust checks
        uses: tcrypt25519/ci/.github/actions/check-rust@main
        with:
          run-coverage: true
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  check-rust-push:
    if: github.event_name == 'push'
    name: Check Rust (Push)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -D warnings

      - name: Test
        run: cargo test --workspace
