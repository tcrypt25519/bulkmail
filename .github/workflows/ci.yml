---
name: CI

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-rust:
    if: (github.event.action != 'closed' || github.event.pull_request.merged == true)
    name: Check Rust
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed for commit-changes push
      pull-requests: write    # needed for PR comments (e.g., Codecov)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # required for commit & rebase in shared action

      - name: Run shared Rust checks
        uses: tcrypt25519/ci/.github/actions/check-rust@main
        with:
          run-coverage: true
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
